server {
    listen       80;
    server_name  _;

    root   /usr/share/nginx/html;
    index  index.html;

    # Compression — les bundles JS/CSS sont gros mais très compressibles
    gzip            on;
    gzip_vary       on;
    gzip_min_length 1024;
    gzip_types      text/plain text/css application/javascript application/json image/svg+xml;

    # Cache long pour les assets fingerprintés par Vite (hash dans le nom)
    location /assets/ {
        expires    1y;
        add_header Cache-Control "public, immutable";
        try_files  $uri =404;
    }

    # SPA : toute route inconnue retombe sur index.html (routing côté client)
    location / {
        try_files $uri $uri/ /index.html;
    }

    # index.html ne doit jamais être mis en cache (sinon les nouveaux assets
    # fingerprintés ne sont pas référencés après un déploiement)
    location = /index.html {
        add_header Cache-Control "no-cache";
    }
}
